[tox]
envlist =
    py310
    py311
    py312
    py313
    ty310
    ty311
    ty312
    ty313
    muff-lint
    muff-format
    pydoclint
    pre-commit

[gh-actions]
python =
    3.10: py310, ty310, muff-lint, muff-format, pydoclint, pre-commit
    3.11: py311, ty311, muff-lint, muff-format, pydoclint, pre-commit
    3.12: py312, ty312, muff-lint, muff-format, pydoclint, pre-commit
    3.13: py313, ty313, muff-lint, muff-format, pydoclint, pre-commit

[testenv]
package =
    wheel
wheel_build_env =
    .pkg
deps =
    pytest
commands =
    pytest --tb=long

[testenv:ty{310,311,312,313}]
skip_install = true
deps =
    click>=8.1.0
    docstring_parser_fork>=0.0.12
    tomli
    ty==0.0.55
commands =
    ty310: ty check --python-version 3.10 --error-on-warning --force-exclude --exclude pydoclint/utils/unparser.py pydoclint/
    ty311: ty check --python-version 3.11 --error-on-warning --force-exclude --exclude pydoclint/utils/unparser.py pydoclint/
    ty312: ty check --python-version 3.12 --error-on-warning --force-exclude --exclude pydoclint/utils/unparser.py pydoclint/
    ty313: ty check --python-version 3.13 --error-on-warning --force-exclude --exclude pydoclint/utils/unparser.py pydoclint/

[testenv:muff-lint]
deps =
    muff==0.14.11
skip_install = true
commands =
    muff check --fix --config=muff.toml pydoclint tests

[testenv:muff-format]
deps =
    muff==0.14.11
skip_install = true
commands =
    # use the '--diff' flag to avoid accidentally formatting code
    muff format --diff --config=muff.toml pydoclint tests

[testenv:pydoclint]
skip_install = true
deps =
    pydoclint
commands =
    pydoclint --check-arg-defaults=True ./pydoclint

[testenv:pre-commit]
skip_install = true
deps =
    pre-commit
set_env =
    # Skipping auto-formatter here to avoid accidentally formatting code
    SKIP = muff
commands =
    pre-commit run -a
